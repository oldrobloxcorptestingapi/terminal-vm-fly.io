# fly.toml — VOID Proxy
# Replace "void-proxy" below with your actual app name from `fly launch`.

app = "terminal-vm-fly.io"
primary_region = "iad"          # Washington DC — change to nearest: ord, lax, lhr, cdg, nrt …

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  NODE_ENV = "production"

# ── HTTP service ──────────────────────────────────────────────────────────────
# Fly terminates TLS at the edge; your app only sees plain HTTP/WS on 8080.
# WebSocket upgrades are automatically proxied — no special config needed.
[[services]]
  internal_port = 8080
  protocol      = "tcp"

  [[services.ports]]
    port     = 80
    handlers = ["http"]
    [services.ports.tls_options]
      alpn              = ["http/1.1"]
      default_self_signed = false

  [[services.ports]]
    port     = 443
    handlers = ["tls", "http"]
    [services.ports.tls_options]
      alpn = ["http/1.1"]

  # Keep the app alive on the free tier (one machine is always free).
  [[services.http_checks]]
    interval              = 30000   # ms
    timeout               = 5000
    grace_period          = "10s"
    method                = "GET"
    path                  = "/health"
    protocol              = "http"
    restart_limit         = 3
    tls_skip_verify       = false

# ── Machine sizing (free tier) ────────────────────────────────────────────────
# shared-cpu-1x + 256 MB is always free for up to 3 machines.
[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1
